<section class="exp2-section section-padding" id="experience">

  <!-- Section header bar -->
  <div class="exp2-header-bar container">
    <span class="exp2-label-accented">SELECTED WORK EXPERIENCE</span>
    <div class="exp2-header-count text-muted">{{ experiences.length }} ROLES</div>
  </div>

  <!-- One big brutalist block per experience -->
  <div class="exp2-list" #expContainer>
    @for (exp of experiences; track exp.company; let i = $index) {
      <div class="exp2-block interactive" [class.exp2-block--alt]="i % 2 !== 0">

        <!-- Massive number -->
        <div class="exp2-num-col">
          <span class="exp2-ghost-num">0{{ i + 1 }}</span>
        </div>

        <!-- Content -->
        <div class="exp2-content-col container">

          <!-- Top strip -->
          <div class="exp2-top-strip">
            <span class="exp2-date text-uppercase">{{ exp.date }}</span>
            <div class="exp2-strip-line"></div>
          </div>

          <h3 class="exp2-role">{{ exp.role }}</h3>

          <div class="exp2-company-row">
            <span class="exp2-company-tag">{{ exp.company }}</span>
          </div>

          <p class="exp2-desc text-muted">{{ exp.desc }}</p>
        </div>

      </div>
    }
  </div>

</section>
