<section class="svc-brutalist-section section-padding" id="services">
  <div class="container container-flex">

    <!-- Left massive rotating/sticky label -->
    <div class="svc-sticky-bar">
      <h2 class="svc-massive-label hollow-text">WHAT I DO<br/>BEST.</h2>
    </div>

    <!-- Right accordion list -->
    <div class="svc-accordion-list" #servicesList>
      @for (s of services; track s.name; let i = $index) {
        <div class="svc-item interactive" 
             [class.active]="activeServiceIndex === i"
             (click)="toggleService(i)">
          
          <div class="svc-item-header">
            <span class="svc-number text-muted">0{{ i + 1 }}</span>
            <h3 class="svc-name">{{ s.name }}</h3>
            <div class="svc-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            </div>
          </div>

          <div class="svc-item-body">
            <div class="svc-body-inner">
              <p class="svc-short-desc text-muted">{{ s.desc }}</p>
              <p class="svc-extended-desc">{{ s.extendedDesc }}</p>
            </div>
          </div>

        </div>
      }
    </div>

  </div>
</section>
