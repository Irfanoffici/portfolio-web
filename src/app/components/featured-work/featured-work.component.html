<section class="fw-brutalist-section section-padding" id="works">
  <div class="container container-fw">

    <div class="fw-sticky-side">
      <h2 class="fw-vertical-label">FEATURED<br/>WORKS</h2>
      <p class="fw-sub text-muted mt-4">What I excel at is turning complex ideas into scalable realities.</p>
    </div>

    <div class="fw-list-col" #fwContainer>
      @for (project of projects; track project.name; let i = $index) {
        <a [href]="project.link" target="_blank" class="fw-monolithic-item interactive">
          
          <div class="fw-meta text-muted">
            <span class="fw-idx">0{{ i + 1 }}</span>
            <span class="fw-type text-uppercase">{{ project.type }}</span>
            <svg class="fw-arrow" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
          </div>
          
          <h3 class="fw-massive-name">{{ project.name }}</h3>
          
          <div class="fw-hover-reveal">
            <div class="fw-reveal-inner">
              <p class="fw-desc">{{ project.desc }}</p>
              <div class="fw-tags">
                @for (tag of project.tags; track tag) {
                  <span class="fw-terminal-tag">[{{ tag }}]</span>
                }
              </div>
            </div>
          </div>

        </a>
      }
    </div>

  </div>
</section>
