<section class="arsenal-section section-padding" id="arsenal" (mouseleave)="onLeaveSection()">
  <div class="arsenal-header">
    <h2 class="arsenal-title hollow-text">ARSENAL</h2>
  </div>

  <div class="arsenal-categories">
    @for (cat of techCategories; track cat.category; let i = $index) {
      <div class="arsenal-cat-row">
        <!-- Category label -->
        <div class="arsenal-cat-meta">
          <span class="ars-cat-idx">0{{ i + 1 }}</span>
          <h3 class="ars-cat-name">{{ cat.category }}</h3>
        </div>

        <!-- Marquee container -->
        <div class="ars-marquee-wrapper" #marqueeWrapper>
          <div class="ars-marquee-track">
            <!-- Double the tools for infinite loop effect -->
            @for (duplicate of [1, 2]; track duplicate) {
              <div class="ars-marquee-content">
                @for (tool of cat.tools; track tool.name) {
                  <div class="ars-tool-item interactive"
                       (mouseenter)="onHoverTool(tool, $event)"
                       (mousemove)="onMoveTool($event)"
                       (mouseleave)="onLeaveTool()">
                    <span class="ars-tool-name">{{ tool.name }}</span>
                    <span class="ars-separator"> / </span>
                  </div>
                }
              </div>
            }
          </div>
        </div>
      </div>
    }
  </div>
</section>
