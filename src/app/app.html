<router-outlet></router-outlet>

<!-- Custom Cursor (desktop only) -->
<div class="custom-cursor" #customCursor aria-hidden="true"></div>

<!-- Global Header Logo / Menu Button -->
<div class="global-logo interactive" (click)="toggleNav()" [class.nav-open]="isNavOpen" aria-label="Toggle navigation">
  <img loading="eager" decoding="async" src="/assets/images/mi-logo.png" alt="MI Logo">
  <div class="logo-text-flipper">
    <span class="flipper-text text-menu">MENU</span>
    <span class="flipper-text text-close">CLOSE</span>
  </div>
</div>

<!-- Global Navigation Overlay -->
<div class="nav-overlay" [class.active]="isNavOpen" role="dialog" aria-modal="true">
  <!-- Clickable background to close -->
  <div class="nav-bg" (click)="toggleNav()"></div>
  
  <div class="nav-content">
    
    <div class="nav-links">
      <!-- Each nav-item has a .nav-text-clip wrapper for the slide-up animation     -->
      <!-- This way overflow:hidden clips only the slide, not the horizontal width   -->
      <a class="nav-item interactive" (click)="scrollTo('.hero-section')">
        <span class="nav-num">01</span>
        <div class="nav-text-clip">
          <h2 class="nav-text">HOME</h2>
        </div>
      </a>
      <a class="nav-item interactive" (click)="scrollTo('.about-section')">
        <span class="nav-num">02</span>
        <div class="nav-text-clip">
          <h2 class="nav-text">ABOUT</h2>
        </div>
      </a>
      <a class="nav-item interactive" (click)="scrollTo('.featured-work-section')">
        <span class="nav-num">03</span>
        <div class="nav-text-clip">
          <h2 class="nav-text">WORKS</h2>
        </div>
      </a>
      <a class="nav-item interactive" (click)="scrollTo('.footer-section')">
        <span class="nav-num">04</span>
        <div class="nav-text-clip">
          <h2 class="nav-text">CONTACT</h2>
        </div>
      </a>
    </div>

    <div class="nav-footer">
      <div class="nav-info">
        <span>Based in Chennai, India.</span>
        <span>Built on curiosity. Driven by craft.</span>
      </div>
      <div class="nav-socials">
        <a href="https://github.com/Irfanoffici/" target="_blank">GO TO GITHUB ↗</a>
      </div>
    </div>
    
  </div>
</div>
